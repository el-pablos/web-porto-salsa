name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false --passWithNoTests

      - name: Build production
        run: npm run build

  release:
    name: Create Release & Tag
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get commit message
        id: commit
        run: echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Create version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.version }}-${{ steps.sha.outputs.sha }}"
          git tag -a "$TAG" -m "Release $TAG - ${{ steps.commit.outputs.message }}"
          git push origin "$TAG"

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "🌸 Latest Release — v${{ steps.version.outputs.version }}"
          body: |
            ## Portfolio Adinda Salsa Aryadi Putri

            **Version:** `v${{ steps.version.outputs.version }}`
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Last change:** ${{ steps.commit.outputs.message }}

            ---

            ### Tech Stack
            - Next.js 14 + TypeScript
            - Tailwind CSS + Framer Motion
            - Pink pastel theme dengan interactive animations

            ### Live
            🔗 [salsa.tams.codes](https://salsa.tams.codes)

            ---
            _Auto-generated by CI/CD pipeline_
          draft: false
          prerelease: false
          make_latest: true

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}-${{ steps.sha.outputs.sha }}"
          name: "v${{ steps.version.outputs.version }} — ${{ steps.commit.outputs.message }}"
          body: |
            ## Changes
            **Commit:** `${{ github.sha }}`
            **Message:** ${{ steps.commit.outputs.message }}

            See [full changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          draft: false
          prerelease: false
          generate_release_notes: true
